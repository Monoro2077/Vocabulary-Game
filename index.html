<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Tools Typing Quiz</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #283048, #859398, #4e73df, #1cc88a);
  background-size: 400% 400%;
  animation: gradientMove 20s ease infinite;
  text-align:center;
  padding:30px;
  color:white;
}
#gameBox{
  background:white;
  color:#333;
  width:90%;
  max-width:750px;
  margin:auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
input{
  padding:12px;
  width:80%;
  max-width:400px;
  font-size:16px;
  margin:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  padding:10px 16px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
#hintBtn{ background:#9c27b0; color:white; }
#restartBtn{ background:#ff9800; color:white; display:none; }
.music-on{ background:#4CAF50; color:white; }
.music-off{ background:#e74a3b; color:white; }

.correct{ color:green; font-weight:bold; }
.wrong{ color:red; font-weight:bold; }
.translation{ margin-top:8px; background:#f1f1f1; padding:10px; border-radius:8px; }
#hintDisplay{ font-size:18px; letter-spacing:3px; margin-top:5px; }
#score{ margin-top:10px; font-weight:bold; }

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
</style>
</head>

<body>

<h1>Electronic Tools Typing Quiz</h1>

<audio id="bgMusic" loop></audio>

<div id="gameBox">
  <p id="progress"></p>
  <p id="question"></p>
  <div id="hintDisplay"></div>

  <input type="text" id="answerInput" placeholder="Type your answer here">
  <br>

  <button id="hintBtn">Hint</button>
  <button id="restartBtn">Restart</button>
  <button id="musicBtn" class="music-off">🔇 Music: OFF</button>

  <div id="result"></div>
  <p id="score"></p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

/* ================= QUESTIONS ================= */

const questions = [
 {q:"Device used for making phone calls and accessing the internet.",a:"Smartphone",t:"โทรศัพท์มือถือ"},
 {q:"Device used to watch broadcast programs and videos.",a:"Television",t:"ทีวี"},
 {q:"Electronic device used to show time digitally.",a:"Digital Clock",t:"นาฬิกาดิจิทัล"},
 {q:"Machine used to print documents.",a:"Printer",t:"เครื่องปริ้น"},
 {q:"Appliance used to keep food cold and fresh.",a:"Refrigerator",t:"ตู้เย็น"},
 {q:"Portable personal computer.",a:"Notebook",t:"โน๊ตบุค"},
 {q:"Device that distributes internet signals.",a:"Router",t:"เร้าเตอร์"},
 {q:"Appliance used to heat food quickly.",a:"Microwave",t:"ไมโครเวฟ"},
 {q:"Machine used to cool indoor air.",a:"Air Conditioner",t:"เครื่องปรับอากาศ"},
 {q:"Device that moves air to create a breeze.",a:"Fan",t:"พัดลม"},
 {q:"Device used to produce heat.",a:"Heater",t:"ฮีทเตอร์"},
 {q:"Unmanned aerial vehicle controlled remotely.",a:"Drone",t:"โดรน"},
 {q:"Game controller used for playing video games.",a:"Joystick",t:"จอยสติก"},
 {q:"Technology that creates a virtual environment.",a:"VR",t:"VR"},
 {q:"Device used to record or amplify sound.",a:"Microphone",t:"ไมโครโฟน"},
 {q:"Device used to display images on a large screen.",a:"Projector",t:"โปรเจคเตอร์"},
 {q:"Device worn over ears to listen to audio.",a:"Headphones",t:"หูฟัง"},
 {q:"Machine used to wash clothes.",a:"Washing Machine",t:"เครื่องซักผ้า"},
 {q:"Appliance used to cook rice.",a:"Rice Cooker",t:"หม้อหุงข้าว"},
 {q:"Smart wearable device with multiple functions.",a:"Smartwatch",t:"สมาร์ทวอทช์"},
 {q:"Appliance used to cook food with hot air circulation.",a:"Air Fryer",t:"หม้ออบลมร้อน"},
 {q:"Screen used to display computer output.",a:"Monitor",t:"จอภาพ"},
 {q:"Device that outputs sound.",a:"Speaker",t:"ลำโพง"},
 {q:"Pointing device used to control a computer cursor.",a:"Mouse",t:"เมาส์"},
 {q:"Input device used to type on a computer.",a:"Keyboard",t:"คีย์บอร์ด"}
];

let shuffled=[], current=0, score=0, isCooldown=false, revealedIndexes=[];

/* ================= GAME ================= */

function shuffle(array){ return array.sort(()=>Math.random()-0.5); }
function normalize(text){ return text.toLowerCase().replace(/\s+/g,'').trim(); }

function startGame(){
 shuffled=shuffle([...questions]);
 current=0; score=0;
 document.getElementById("score").innerText="";
 document.getElementById("restartBtn").style.display="none";
 showQuestion();
}

function showQuestion(){
 document.getElementById("result").innerHTML="";
 document.getElementById("answerInput").value="";
 revealedIndexes=[0];
 updateHintDisplay();

 document.getElementById("progress").innerText =
   "Question "+(current+1)+" of "+shuffled.length;
 document.getElementById("question").innerText =
   shuffled[current].q;
}

function updateHintDisplay(){
 const answer = shuffled[current].a;
 let display="";
 for(let i=0;i<answer.length;i++){
   if(answer[i]===" ") display+="  ";
   else if(revealedIndexes.includes(i)) display+=answer[i]+" ";
   else display+="_ ";
 }
 document.getElementById("hintDisplay").innerText=display;
}

function showHint(){
 const answer = shuffled[current].a;
 let hidden=[];
 for(let i=0;i<answer.length;i++){
   if(answer[i]!==" "&&!revealedIndexes.includes(i)) hidden.push(i);
 }
 if(hidden.length>0){
   revealedIndexes.push(hidden[Math.floor(Math.random()*hidden.length)]);
   updateHintDisplay();
 }
}

function checkAnswer(){
 if(isCooldown) return;
 const input=document.getElementById("answerInput");
 if(input.value.trim()==="") return;

 const user=normalize(input.value);
 const correct=normalize(shuffled[current].a);

 isCooldown=true;
 input.disabled=true;

 if(user===correct) score++;

 document.getElementById("result").innerHTML =
 (user===correct?"<span class='correct'>Correct!</span>":"<span class='wrong'>Wrong!</span>")
 +"<div class='translation'><b>Answer:</b> "+shuffled[current].a+
 "<br><b>Thai:</b> "+shuffled[current].t+"</div>";

 setTimeout(()=>{
   input.disabled=false;
   isCooldown=false;
   nextQuestion();
 },1000);
}

function nextQuestion(){
 current++;
 if(current<shuffled.length) showQuestion();
 else{
   document.getElementById("question").innerText="Quiz Completed!";
   document.getElementById("score").innerText=
     "Final Score: "+score+" / "+shuffled.length;
   document.getElementById("restartBtn").style.display="inline-block";
 }
}

/* ================= MUSIC ================= */

const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

music.src = "https://image2url.com/r2/default/audio/1770897167957-8435b616-4637-4b21-bbee-0d19339b2b41.mp3";
music.loop = true;
music.volume = 0;

const MAX_VOLUME = 0.05;
const FADE_SPEED = 50;
let fadeInterval=null;
let isPlaying=false;

function fadeIn(duration=800){
 clearInterval(fadeInterval);
 music.play().catch(()=>{});
 isPlaying=true;
 let step=MAX_VOLUME/(duration/FADE_SPEED);
 fadeInterval=setInterval(()=>{
   if(music.volume<MAX_VOLUME)
     music.volume=Math.min(music.volume+step,MAX_VOLUME);
   else clearInterval(fadeInterval);
 },FADE_SPEED);
 musicBtn.className="music-on";
 musicBtn.innerHTML="🔊 Music: ON";
}

function fadeOut(duration=800){
 clearInterval(fadeInterval);
 let step=MAX_VOLUME/(duration/FADE_SPEED);
 fadeInterval=setInterval(()=>{
   if(music.volume>0)
     music.volume=Math.max(music.volume-step,0);
   else{
     clearInterval(fadeInterval);
     music.pause();
     isPlaying=false;
   }
 },FADE_SPEED);
 musicBtn.className="music-off";
 musicBtn.innerHTML="🔇 Music: OFF";
}

function toggleMusic(){
 isPlaying?fadeOut():fadeIn();
}

/* ================= EVENTS ================= */

document.getElementById("hintBtn").addEventListener("click",showHint);
document.getElementById("restartBtn").addEventListener("click",startGame);
document.getElementById("musicBtn").addEventListener("click",toggleMusic);
document.getElementById("answerInput").addEventListener("keydown",e=>{
 if(e.key==="Enter") checkAnswer();
});

document.addEventListener("click",function autoStart(){
 fadeIn(1200);
 document.removeEventListener("click",autoStart);
});

startGame();

}); 
</script>

</body>
</html>
